<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Learn - Apprends Python !</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'dark-900': '#0a0e1a',
              'dark-800': '#0f1629',
              'dark-700': '#131d35',
              'dark-600': '#1a2545',
              'dark-500': '#243060',
              'accent-green': '#00ff88',
              'accent-cyan': '#00d4ff',
              'accent-purple': '#a855f7',
              'accent-orange': '#ff6b35',
            }
          }
        }
      }
    </script>

    <!-- highlight.js CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

    <!-- Pyodide CDN -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

      * { box-sizing: border-box; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #0a0e1a;
        color: #e2e8f0;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      code, pre, textarea.code-editor {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
      }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0f1629; }
      ::-webkit-scrollbar-thumb { background: #243060; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #00d4ff; }

      @keyframes glow-pulse {
        0%, 100% { box-shadow: 0 0 5px #00ff8844, 0 0 10px #00ff8822; }
        50% { box-shadow: 0 0 15px #00ff8888, 0 0 30px #00ff8844; }
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }

      .animate-glow { animation: glow-pulse 2s ease-in-out infinite; }
      .animate-fade-in { animation: fade-in 0.3s ease-out; }
      .animate-spin-custom { animation: spin 1s linear infinite; }
      .animate-float { animation: float 3s ease-in-out infinite; }

      textarea.code-editor {
        background: #0d1117;
        color: #e6edf3;
        border: 1px solid #30363d;
        resize: vertical;
        line-height: 1.5;
        tab-size: 4;
      }

      textarea.code-editor:focus {
        outline: none;
        border-color: #00d4ff;
        box-shadow: 0 0 0 2px #00d4ff22;
      }

      .lesson-content h2 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #00d4ff;
        margin-top: 2rem;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid #1a2545;
      }

      .lesson-content h3 {
        font-size: 1.15rem;
        font-weight: 600;
        color: #00ff88;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
      }

      .lesson-content p {
        color: #94a3b8;
        line-height: 1.7;
        margin-bottom: 1rem;
      }

      .lesson-content ul {
        list-style: none;
        padding-left: 0;
        margin-bottom: 1rem;
      }

      .lesson-content ul li {
        color: #94a3b8;
        padding: 0.3rem 0;
        padding-left: 1.5rem;
        position: relative;
      }

      .lesson-content ul li::before {
        content: '\25B8';
        color: #00ff88;
        position: absolute;
        left: 0;
      }

      .lesson-content .info-box {
        background: #131d35;
        border-left: 4px solid #00d4ff;
        border-radius: 0 8px 8px 0;
        padding: 1rem 1.25rem;
        margin: 1.5rem 0;
      }

      .lesson-content .info-box p {
        margin: 0;
        color: #cbd5e1;
      }

      .lesson-content .tip-box {
        background: #0f2818;
        border-left: 4px solid #00ff88;
        border-radius: 0 8px 8px 0;
        padding: 1rem 1.25rem;
        margin: 1.5rem 0;
      }

      .lesson-content .tip-box p {
        margin: 0;
        color: #86efac;
      }

      .hljs {
        background: #0d1117 !important;
        padding: 1.25rem !important;
        border-radius: 8px !important;
        font-size: 0.875rem !important;
        line-height: 1.6 !important;
        border: 1px solid #21262d !important;
      }

      .progress-ring {
        transition: stroke-dashoffset 0.5s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
